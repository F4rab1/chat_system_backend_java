version: "3.8"

services:
  mongodb:
    container_name: chat-mongodb
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: chatdb

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: